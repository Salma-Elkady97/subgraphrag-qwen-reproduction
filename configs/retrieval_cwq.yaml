# Retrieval config for WebQSP. Values mirror the SubgraphRAG defaults used in this work.
env:
  num_threads: 4
  seed: 42
retriever:
  topic_pe: true
  DDE_kwargs:
    num_rounds: 2
    num_reverse_rounds: 2
optimizer:
  lr: 1e-3
  weight_decay: 0.0
train:
  num_epochs: 10000
  patience: 10
  save_prefix: cwq
eval:
  k_list: [25, 50, 100, 200, 300, 500]
